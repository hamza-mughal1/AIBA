site_name: AIBA 
site_description: Autonomous internet browsing agent
site_author: AIBA
repo_url: https://github.com/hamza-mughal1/AIBA
repo_name: AIBA
edit_uri: ""

theme:
  name: material
  logo: assets/aiba_logo.png
  favicon: assets/aiba_logo.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  generator: false

plugins:
  - search

nav:
  - Home: index.md
  - Engineering: engineering.md
  - Getting Started: getting-started.md
  - Core Concepts:
      - Modes: core-concepts/modes.md
      - Templates: core-concepts/templates.md
      - Effort: core-concepts/effort.md
      - REPL: usage/repl.md
  - Settings:
      - Environment: settings/environment.md
  - Usage:
      - Sessions: usage/sessions.md
      - Browser Session & Cookies: usage/browser-session.md
  - AIBA-beats:
      - Introduction: aiba-beats/introduction.md
      - CLI: aiba-beats/cli.md
      - Scheduling: aiba-beats/scheduling.md
  - Tools:
      - Main Agent: tools/main-agent.md
      - Sub-Agent: tools/sub-agent.md
      - Common: tools/common-tools.md
  - UI:
      - TUI: ui/tui.md
  - Security:
      - Guardrails: security/guardrails.md
  - Troubleshooting: troubleshooting.md
  - Contributors: contributors.md
